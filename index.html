<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Fap Roulette</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; }
    #roll-btn { padding: 20px 40px; font-size: 2rem; background: #c00; border: none; border-radius: 50%; cursor: pointer; margin: 30px; }
    #result { font-size: 3rem; margin: 20px; }
    img { max-width: 90%; border: 5px solid #c00; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>🍆 Open Fap Roulette</h1>
  <p>Appuie sur Roll pour laisser le hasard décider !</p>
  
  <button id="roll-btn">ROLL 🎲</button>
  
  <div id="result"></div>
  <img id="roulette-img" src="" alt="Roulette">
  
  <script>
    // Tes images de roulettes (ajoute-les dans le dossier /images ou utilise des URLs externes)
    const roulettes = [
      "https://exemple.com/roulette1.png", // ← Remplace par tes vraies images
      "https://exemple.com/roulette2.png",
      // Ajoute-en 20-50 pour que ce soit fun
    ];

    document.getElementById("roll-btn").addEventListener("click", () => {
      // Génère W X Y Z entre 1 et 10 (tu peux adapter la plage selon tes images)
      const w = Math.floor(Math.random() * 10) + 1;
      const x = Math.floor(Math.random() * 10) + 1;
      const y = Math.floor(Math.random() * 10) + 1;
      const z = Math.floor(Math.random() * 10) + 1;
      
      const randomImg = roulettes[Math.floor(Math.random() * roulettes.length)];
      
      document.getElementById("result").innerHTML = `
        <strong>W${w} • X${x} • Y${y} • Z${z}</strong><br>
        <small>Applique ces chiffres sur l’image ci-dessous !</small>
      `;
      document.getElementById("roulette-img").src = randomImg;
    });
  </script>
</body>
</html>
